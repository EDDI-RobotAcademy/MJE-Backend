services:
  mje_mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: password
      MYSQL_DATABASE: mje
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    command: --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  backend:
    build: .
    ports:
      - "33333:33333"
    depends_on:
      mje_mysql:
        condition: service_healthy
      redis:
        condition: service_started
    env_file:
      - .env
    environment:
      MYSQL_HOST: mje_mysql
      MYSQL_PORT: 3306
      MYSQL_PASSWORD: password
      REDIS_URL: redis://redis:6379
    command: ["/wait-for-it.sh", "mje_mysql:3306", "--", "uvicorn", "main:app", "--host", "0.0.0.0", "--port", "33333"]

volumes:
  mysql_data:
